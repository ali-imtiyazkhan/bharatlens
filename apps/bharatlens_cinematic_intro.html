
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Mono:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;overflow:hidden}
#stage{width:100%;height:600px;background:#000;position:relative;overflow:hidden;cursor:pointer;font-family:'DM Mono',monospace}

/* grid */
#grid-layer{position:absolute;inset:0;opacity:0;transition:opacity 1s}
#grid-layer svg{width:100%;height:100%}

/* orbs */
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0;transition:opacity 2s}
#o1{width:500px;height:500px;background:rgba(201,168,76,0.12);top:-10%;left:-10%}
#o2{width:400px;height:400px;background:rgba(100,180,220,0.08);top:20%;right:-8%}
#o3{width:300px;height:300px;background:rgba(180,100,200,0.07);bottom:0%;left:30%}

/* scan line */
#scanline{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.6),transparent);top:-2px;opacity:0}

/* main canvas */
#main-canvas{position:absolute;inset:0;width:100%;height:100%}

/* text layers */
.text-layer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}

#scene-tagline{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.3em;color:rgba(201,168,76,0.7);opacity:0;white-space:nowrap}

#scene-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0}
#scene-title .t1{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;font-size:72px;color:#f0ece4;line-height:0.9;letter-spacing:-0.01em}
#scene-title .t2{display:block;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:64px;color:transparent;-webkit-text-stroke:0.5px #c9a84c;letter-spacing:0.06em;line-height:1}
#scene-title .t3{display:block;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.24em;color:#c9a84c;margin-top:18px}

#scene-features{position:absolute;bottom:60px;left:0;right:0;display:flex;justify-content:center;gap:0;opacity:0}
.feat-pill{font-size:8px;letter-spacing:0.18em;color:rgba(240,236,228,0.45);padding:8px 20px;border-right:0.5px solid rgba(201,168,76,0.2)}
.feat-pill:last-child{border-right:none}
.feat-pill span{color:#c9a84c}

#scene-logo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;text-align:center}
#scene-logo .brand{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;letter-spacing:0.24em;color:#f0ece4}
#scene-logo .sub{font-size:8px;letter-spacing:0.28em;color:#c9a84c;margin-top:8px}
#scene-logo .ring-wrap{position:relative;width:80px;height:80px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center}
.logo-ring{position:absolute;border-radius:50%;border:0.5px solid rgba(201,168,76,0.4)}
.lr1{inset:0;animation:spin 8s linear infinite}
.lr2{inset:8px;border-color:rgba(201,168,76,0.2);animation:spin 5s linear infinite reverse}
.logo-dot{width:12px;height:12px;border-radius:50%;background:#c9a84c;position:relative;z-index:2}
@keyframes spin{to{transform:rotate(360deg)}}

/* progress bar */
#progress{position:absolute;bottom:0;left:0;height:1px;background:#c9a84c;width:0%;transition:width linear;opacity:0.5}

/* replay btn */
#replay{position:absolute;bottom:20px;right:24px;font-size:8px;letter-spacing:0.14em;color:rgba(201,168,76,0.5);background:transparent;border:0.5px solid rgba(201,168,76,0.3);padding:7px 16px;cursor:pointer;font-family:'DM Mono',monospace;opacity:0;transition:all 0.3s}
#replay:hover{color:#c9a84c;border-color:#c9a84c}

/* counter */
#counter{position:absolute;top:22px;right:24px;font-size:8px;letter-spacing:0.14em;color:rgba(201,168,76,0.35);opacity:0}

/* line decorations */
.h-line{position:absolute;height:0.5px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.4),transparent);opacity:0}
#hl1{top:80px;left:10%;right:10%}
#hl2{bottom:80px;left:10%;right:10%}
.v-line{position:absolute;width:0.5px;background:linear-gradient(180deg,transparent,rgba(201,168,76,0.3),transparent);opacity:0}
#vl1{left:80px;top:10%;bottom:10%}
#vl2{right:80px;top:10%;bottom:10%}

/* corner marks */
.corner{position:absolute;width:20px;height:20px;opacity:0}
#c1{top:16px;left:16px;border-top:0.5px solid #c9a84c;border-left:0.5px solid #c9a84c}
#c2{top:16px;right:16px;border-top:0.5px solid #c9a84c;border-right:0.5px solid #c9a84c}
#c3{bottom:16px;left:16px;border-bottom:0.5px solid #c9a84c;border-left:0.5px solid #c9a84c}
#c4{bottom:16px;right:16px;border-bottom:0.5px solid #c9a84c;border-right:0.5px solid #c9a84c}
</style>

<div id="stage">
  <div id="grid-layer">
    <svg xmlns="http://www.w3.org/2000/svg"><defs><pattern id="g" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M 50 0 L 0 0 0 50" fill="none" stroke="#c9a84c" stroke-width="0.4"/></pattern></defs><rect width="100%" height="100%" fill="url(#g)"/></svg>
  </div>

  <div class="orb" id="o1"></div>
  <div class="orb" id="o2"></div>
  <div class="orb" id="o3"></div>

  <canvas id="main-canvas"></canvas>
  <div id="scanline"></div>

  <div class="h-line" id="hl1"></div>
  <div class="h-line" id="hl2"></div>
  <div class="v-line" id="vl1"></div>
  <div class="v-line" id="vl2"></div>

  <div class="corner" id="c1"></div>
  <div class="corner" id="c2"></div>
  <div class="corner" id="c3"></div>
  <div class="corner" id="c4"></div>

  <div id="scene-tagline">AI · HERITAGE · TOURISM · INDIA</div>

  <div id="scene-title">
    <span class="t1">Discover</span>
    <span class="t2">HERITAGE</span>
    <span class="t3">AN AI-POWERED CULTURAL TOURISM PLATFORM</span>
  </div>

  <div id="scene-logo">
    <div class="ring-wrap">
      <div class="logo-ring lr1"></div>
      <div class="logo-ring lr2"></div>
      <div class="logo-dot"></div>
    </div>
    <div class="brand">BHARATLENS</div>
    <div class="sub">EXPLORE · TRANSLATE · DISCOVER</div>
  </div>

  <div id="scene-features">
    <div class="feat-pill"><span>AR</span> TRANSLATION</div>
    <div class="feat-pill"><span>AI</span> TRIP PLANNER</div>
    <div class="feat-pill"><span>3D</span> VIRTUAL TOURS</div>
    <div class="feat-pill"><span>40+</span> LANGUAGES</div>
    <div class="feat-pill"><span>100%</span> OFFLINE</div>
  </div>

  <div id="counter">00 / 05</div>
  <div id="progress"></div>
  <button id="replay">↺ REPLAY</button>
</div>

<script>
const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');
const stage = document.getElementById('stage');

function resize(){
  canvas.width = stage.offsetWidth;
  canvas.height = stage.offsetHeight;
}
resize();

// ── helpers ──
function el(id){ return document.getElementById(id) }
function fade(id, opacity, duration, delay=0){
  const e = el(id) || document.querySelector(id);
  if(!e) return;
  setTimeout(()=>{
    e.style.transition = `opacity ${duration}ms ease`;
    e.style.opacity = opacity;
  }, delay);
}
function fadeAll(ids, opacity, duration, delay=0){
  ids.forEach((id,i) => fade(id, opacity, duration, delay + i*80));
}

// ── Globe drawing ──
let globeT = 0;
let globeActive = false;
let globeX, globeY, globeR;

function drawGlobe(x, y, r, t, alpha=1){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.clip();

  const bg = ctx.createRadialGradient(x-r*0.2, y-r*0.25, r*0.05, x, y, r);
  bg.addColorStop(0,'#e8d8a0'); bg.addColorStop(0.25,'#a0c8e8');
  bg.addColorStop(0.5,'#c0a0e0'); bg.addColorStop(0.75,'#e0a0b8');
  bg.addColorStop(1,'#80c0a8');
  ctx.fillStyle=bg; ctx.fillRect(x-r-2,y-r-2,r*2+4,r*2+4);

  for(let i=0;i<12;i++){
    const a=((t*0.4+i*30)*Math.PI)/180;
    const g=ctx.createLinearGradient(
      x+Math.cos(a)*r*0.2, y+Math.sin(a)*r*0.2,
      x+Math.cos(a+Math.PI)*r, y+Math.sin(a+Math.PI)*r
    );
    const h=(i*30+t*2)%360;
    g.addColorStop(0,`hsla(${h},75%,82%,0)`);
    g.addColorStop(0.4,`hsla(${h},90%,78%,0.55)`);
    g.addColorStop(0.6,`hsla(${(h+60)%360},82%,74%,0.4)`);
    g.addColorStop(1,`hsla(${(h+120)%360},72%,80%,0)`);
    ctx.fillStyle=g; ctx.fillRect(x-r-2,y-r-2,r*2+4,r*2+4);
  }

  // gold sheen
  const gs = ctx.createLinearGradient(x-r,y,x+r,y);
  gs.addColorStop(0,'rgba(201,168,76,0)');
  gs.addColorStop(0.5,`rgba(201,168,76,${0.1+0.05*Math.sin(t*0.025)})`);
  gs.addColorStop(1,'rgba(201,168,76,0)');
  ctx.fillStyle=gs; ctx.fillRect(x-r-2,y-r-2,r*2+4,r*2+4);

  const sh=ctx.createRadialGradient(x-r*0.4,y-r*0.45,r*0.02,x-r*0.22,y-r*0.28,r*0.7);
  sh.addColorStop(0,'rgba(255,255,255,0.8)');
  sh.addColorStop(0.2,'rgba(255,255,255,0.18)');
  sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh; ctx.fillRect(x-r-2,y-r-2,r*2+4,r*2+4);

  const rim=ctx.createRadialGradient(x,y,r*0.5,x,y,r);
  rim.addColorStop(0,'rgba(0,0,0,0)'); rim.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=rim; ctx.fillRect(x-r-2,y-r-2,r*2+4,r*2+4);
  ctx.restore();

  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.45)'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

function drawOrbitalRings(x, y, r, t, alpha=1){
  ctx.save(); ctx.globalAlpha=alpha*0.6;
  // outer ring
  ctx.save();
  ctx.translate(x,y); ctx.rotate(t*0.008);
  ctx.beginPath(); ctx.arc(0,0,r+28,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
  // tick
  ctx.fillStyle='#c9a84c'; ctx.fillRect(-0.5,-r-34,1,8);
  ctx.restore();
  // mid ring
  ctx.save();
  ctx.translate(x,y); ctx.rotate(-t*0.012);
  ctx.beginPath(); ctx.arc(0,0,r+14,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
  ctx.restore();
  ctx.restore();
}

// ── Particles ──
const particles = [];
function spawnParticle(x,y){
  for(let i=0;i<3;i++){
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*1.2,
      vy:(Math.random()-0.5)*1.2,
      life:1, decay:0.008+Math.random()*0.006,
      r:1+Math.random()*2,
      gold:Math.random()>0.5
    });
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life-=p.decay;
    if(p.life<=0){ particles.splice(i,1); continue; }
    ctx.save();
    ctx.globalAlpha=p.life*0.6;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.gold?'#c9a84c':'rgba(240,236,228,0.8)';
    ctx.fill(); ctx.restore();
  }
}

// ── Scenes ──
let scene = 0;
let sceneT = 0;
let animId;
let globeAlpha = 0;
let globeScale = 0;
let targetScale = 0;
let running = false;

const W = ()=>canvas.width, H = ()=>canvas.height;

function mainLoop(){
  ctx.clearRect(0,0,W(),H());
  sceneT++;
  globeT += 0.7;

  // always draw globe if active
  if(globeActive){
    const cx = W()/2, cy = H()/2;
    globeScale += (targetScale - globeScale)*0.05;
    globeAlpha += (targetAlpha - globeAlpha)*0.04;
    const r = 110 * globeScale;
    if(r > 2){
      drawOrbitalRings(cx, cy, r, globeT, globeAlpha);
      drawGlobe(cx, cy, r, globeT, globeAlpha);
    }
    if(Math.random()<0.15) spawnParticle(cx + (Math.random()-0.5)*r*2, cy + (Math.random()-0.5)*r*2);
  }

  updateParticles();
  animId = requestAnimationFrame(mainLoop);
}

let targetAlpha = 0;

// ── Scanline animation ──
function animateScan(){
  const sl = el('scanline');
  sl.style.opacity = '1';
  sl.style.transition = 'top 1.2s linear';
  sl.style.top = '0px';
  setTimeout(()=>{ sl.style.top = canvas.height+'px'; },50);
  setTimeout(()=>{ sl.style.opacity='0'; sl.style.top='-2px'; },1300);
}

// ── Progress bar ──
function setProgress(pct, duration){
  const pb = el('progress');
  pb.style.opacity='0.5';
  pb.style.transition=`width ${duration}ms linear`;
  pb.style.width = pct+'%';
}

// ── Counter ──
function setCounter(cur, total){
  const c = el('counter');
  c.style.opacity='1';
  c.textContent = String(cur).padStart(2,'0') + ' / ' + String(total).padStart(2,'0');
}

// ── Scene sequence ──
function runIntro(){
  running = true;
  globeActive = false; globeAlpha=0; globeScale=0; targetScale=0; targetAlpha=0;

  // reset all
  ['scene-tagline','scene-title','scene-logo','scene-features','grid-layer',
   'o1','o2','o3','hl1','hl2','vl1','vl2','c1','c2','c3','c4','counter','replay']
  .forEach(id=>{ const e=el(id); if(e){e.style.transition='none';e.style.opacity='0';}});
  el('progress').style.width='0%';

  // SCENE 1 — black + scanline + tagline (0–2.5s)
  setTimeout(()=>{
    setCounter(1,5);
    animateScan();
    setProgress(20, 2400);
    fade('scene-tagline',1,800,400);
  },300);

  // SCENE 2 — grid + orbs appear (2.5–5s)
  setTimeout(()=>{
    setCounter(2,5);
    fade('scene-tagline',0,500);
    setProgress(40, 2400);
    fade('grid-layer',1,1200);
    fadeAll(['o1','o2','o3'],1,1500,200);
    fadeAll(['c1','c2','c3','c4'],1,600,400);
    fadeAll(['hl1','hl2'],1,800,600);
    fadeAll(['vl1','vl2'],1,800,800);

    // globe rises
    globeActive=true; targetScale=1; targetAlpha=1;
    animateScan();
  },2500);

  // SCENE 3 — title fades in over globe (5–9s)
  setTimeout(()=>{
    setCounter(3,5);
    setProgress(60, 4000);
    fade('scene-title',1,1000);
    targetAlpha=0.35; // dim globe behind text
  },5000);

  // SCENE 4 — features strip (9–12.5s)
  setTimeout(()=>{
    setCounter(4,5);
    setProgress(80, 3000);
    fade('scene-title',0,600);
    targetAlpha=0.7;
    setTimeout(()=>fade('scene-features',1,800),700);
    animateScan();
  },9000);

  // SCENE 5 — logo finale (12.5–17s)
  setTimeout(()=>{
    setCounter(5,5);
    setProgress(100, 4500);
    fade('scene-features',0,500);
    targetScale=1.1; targetAlpha=0.2;
    setTimeout(()=>fade('scene-logo',1,1200),600);
    fadeAll(['hl1','hl2','vl1','vl2'],0,600,200);
  },12500);

  // END
  setTimeout(()=>{
    fade('replay',1,800);
    running=false;
  },17000);
}

// ── Start ──
mainLoop();
setTimeout(runIntro, 400);

el('replay').addEventListener('click',()=>{
  if(running) return;
  fade('replay',0,300);
  setTimeout(runIntro,400);
});

el('stage').addEventListener('click',()=>{
  if(!running && parseFloat(el('replay').style.opacity||0)<0.5){
    runIntro();
  }
});

window.addEventListener('resize',()=>{ resize(); });
</script>
