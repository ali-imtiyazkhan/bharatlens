services:
  - type: web
    name: bharatlens-api
    env: node
    plan: free
    region: oregon 
    rootDir: .
    buildCommand: pnpm install && pnpm run db:generate && pnpm --filter api build
    startCommand: pnpm --filter api start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: bharatlens-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://bharatlens.vercel.app # Change this to your actual Vercel URL
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: bharatlens-db
    plan: free
    region: oregon
